server:
  http_listen: ":9280"

logging:
  level: info
  format: json

observability:
  metrics_enabled: false

oauth:
  issuer: http://127.0.0.1:9080
  audience: lumen-mcp
  jwks_url: http://127.0.0.1:9080/.well-known/jwks.json

gateway:
  base_url: http://127.0.0.1:18080
  admin_api_key: local-dev-admin-key

auth:
  static_bearer: ${LUMEN_MCP_BEARER_TOKEN}
  required_scopes:
    - mcp:tools
  tool_scope_map:
    list_routes: read
    get_route: read
    put_route: gateway:write
    patch_route: gateway:write
    delete_route: gateway:write
    list_services: read
    put_service: gateway:write
    list_upstreams: read
    put_upstream: gateway:write
    list_plugin_configs: read
    put_plugin_config: gateway:write
    list_global_rules: read
    put_global_rule: gateway:write
    preview_import: gateway:write
    apply_import: gateway:write
    export_bundle: read
    history_list: read
    get_schema: read
    list_plugins: read
    get_stats: read
    analyze_latency: read
    tune_upstream_timeout: gateway:write
    history_rollback: gateway:write

audit:
  backend: stdout

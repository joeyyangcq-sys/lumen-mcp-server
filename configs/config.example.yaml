server:
  http_listen: ":9280"
  public_base_url: http://127.0.0.1:9280
  mcp_endpoint: /mcp
  read_timeout: 10s
  write_timeout: 10s

logging:
  level: info
  format: json

observability:
  metrics_enabled: true
  metrics_path: /metrics

oauth:
  issuer: http://127.0.0.1:9080
  audience: http://127.0.0.1:9280/mcp
  jwks_url: http://127.0.0.1:9080/oauth/jwks.json
  protected_resource_metadata_url: http://127.0.0.1:9280/.well-known/oauth-protected-resource

gateway:
  base_url: http://127.0.0.1:18080
  admin_api_key: local-dev-admin-key

auth:
  static_bearer: ""     # pre-obtained Bearer token for stdio mode; if empty, triggers OAuth login flow
  stdio_client_id: ""  # OAuth client_id for stdio; if empty, auto-registers via DCR
  default_challenge_scope: mcp:tools
  scopes_supported:
    - mcp:tools
    - read
    - gateway:write
    - oauth:write
  required_scopes:
    - mcp:tools
  tool_scope_map:
    list_routes: read
    get_route: read
    put_route: gateway:write
    patch_route: gateway:write
    delete_route: gateway:write
    list_services: read
    put_service: gateway:write
    list_upstreams: read
    put_upstream: gateway:write
    list_plugin_configs: read
    put_plugin_config: gateway:write
    list_global_rules: read
    put_global_rule: gateway:write
    preview_import: gateway:write
    apply_import: gateway:write
    export_bundle: read
    history_list: read
    get_schema: read
    list_plugins: read
    get_stats: read
    analyze_latency: read
    tune_upstream_timeout: gateway:write
    history_rollback: gateway:write

audit:
  backend: stdout
  sqlite_path: ./data/mcp-audit.db
  postgres_url: ""  # e.g. postgres://user:pass@localhost:5432/lumen_mcp?sslmode=disable
